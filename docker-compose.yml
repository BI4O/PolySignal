services:
  frontend:
    build: .
    env_file: .env
    environment:
      # override polybot host for Docker networking (same compose network)
      LANGGRAPH_HOST: polybot-langgraph-api-1
      LANGGRAPH_PORT: "8123"
    ports:
      - "${HOST_PORT}:${PORT}"
    networks:
      - polybot_default

networks:
  polybot_default:
    external: true
